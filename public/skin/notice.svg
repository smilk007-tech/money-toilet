<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 297" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fffefb"/>
      <stop offset="1" stop-color="#f3f1eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <rect x="6" y="7" width="198" height="284" fill="#151719" opacity=".18" filter="url(#shadow)"/>
  <rect x="5" y="5" width="200" height="287" rx="1" fill="url(#paper)"/>

  <!-- 테이프 -->
  <path d="M0 13 16 0 28 12 11 27Z" fill="#d8d4cc" opacity=".80"/>
  <path d="M210 13 194 0 182 12 199 27Z" fill="#d8d4cc" opacity=".80"/>
  <path d="M0 284 16 297 28 285 11 270Z" fill="#d8d4cc" opacity=".80"/>
  <path d="M210 284 194 297 182 285 199 270Z" fill="#d8d4cc" opacity=".80"/>

  <!-- 더미 광고 데이터 -->
  <text x="105" y="45" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="8" font-weight="700" fill="#65625d" letter-spacing="1.4">DUMMY AD</text>
  <text x="105" y="82" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" font-weight="800" fill="#232527">오늘도 수고했어요</text>
  <text x="105" y="105" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="10.5" font-weight="600" fill="#56534f">잠깐의 휴식이</text>
  <text x="105" y="121" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="10.5" font-weight="600" fill="#56534f">좋은 아이디어가 됩니다.</text>

  <rect x="31" y="151" width="148" height="63" rx="5" fill="#ebe7de"/>
  <circle cx="59" cy="182" r="16" fill="#9a8876"/>
  <path d="M52 182h14M59 175v14"/>
  <text x="84" y="176" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="9" font-weight="700" fill="#2e302f">익명 커리어 이야기</text>
  <text x="84" y="191" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="8" fill="#65625d">부담 없이 질문하고</text>
  <text x="84" y="203" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="8" fill="#65625d">경험을 나눠보세요.</text>

  <rect x="55" y="235" width="100" height="25" rx="12.5" fill="#292c2f"/>
  <text x="105" y="251" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="9" font-weight="700" fill="#ffffff">지금 둘러보기</text>
  <text x="105" y="278" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="7.5" fill="#8a867f">JOBTORY SAMPLE POSTER</text>
