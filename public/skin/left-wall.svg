<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 82 856" preserveAspectRatio="none">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a59b90"/>
      <stop offset=".72" stop-color="#b7ada1"/>
      <stop offset="1" stop-color="#90867b"/>
    </linearGradient>
    <pattern id="grain" width="7" height="19" patternUnits="userSpaceOnUse">
      <path d="M1 0v19M3.5 0v19M6 0v19" opacity=".12"/>
      <path d="M2 3v10M5 1v13" opacity=".08"/>
    </pattern>
    <linearGradient id="lowerShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#433f3b" stop-opacity=".60"/>
      <stop offset=".52" stop-color="#59534d" stop-opacity=".26"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 최상단 영역 -->
  <path d="M0 0H82V105L0 0Z" fill="#3b3c3d"/>

  <!-- 왼쪽 벽: 하단 끝점을 이전 위치(y=840)로 복원 -->
  <path d="M0 0 82 105V701L0 840Z" fill="url(#wall)"/>
  <path d="M0 0 82 105V701L0 840Z" fill="url(#grain)"/>

  <!-- 하단 공간감 그림자 -->
  <path d="M0 725 82 653V701L0 840Z" fill="url(#lowerShadow)"/>

  <!-- 금속 세로 막대 -->
  <rect x="78" y="105" width="4" height="735" fill="#8d9295"/>
</svg>
