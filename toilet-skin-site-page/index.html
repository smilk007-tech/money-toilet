<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light only" />
  <title>반응형 화장실 칸 SVG 일러스트 v7</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <figure class="stall-scene" aria-label="공중화장실 칸 내부를 바라보는 반응형 SVG 장면">
      <img class="side side--left" src="./assets/left-wall.svg" alt="" aria-hidden="true" />

      <section class="center" aria-hidden="true">
        <img class="center__base" src="./assets/center-door.svg" alt="" />
        <img class="light" src="./assets/ceiling-light.svg" alt="" />
        <img class="notice" src="./assets/notice.svg" alt="" />
        <img class="hinge hinge--1" src="./assets/hinge.svg" alt="" />
        <img class="hinge hinge--2" src="./assets/hinge.svg" alt="" />
        <img class="hinge hinge--3" src="./assets/hinge.svg" alt="" />
        <img class="latch" src="./assets/latch.svg" alt="" />
      </section>

      <img class="side side--right" src="./assets/right-wall.svg" alt="" aria-hidden="true" />

      <img class="toilet-paper" src="./assets/toilet-paper.svg" alt="" aria-hidden="true" />
      <img class="hook" src="./assets/hook.svg" alt="" aria-hidden="true" />

      <div class="floor" aria-hidden="true">
        <img class="floor__side floor__side--left" src="./assets/floor-left.svg" alt="" />
        <img class="floor__center" src="./assets/floor-center.svg" alt="" />
        <img class="floor__side floor__side--right" src="./assets/floor-right.svg" alt="" />
      </div>

      <img class="knees" src="./assets/knees.svg" alt="" aria-hidden="true" />
    </figure>
  </main>
</body>
</html>
